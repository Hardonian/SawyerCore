name: release-single-binary

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build -p sawyer-cli --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: sawyer-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sawyer*
            README.md
            profiles/*.json
